name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping (it sleeps after 15 mins of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        # Replace the URL below with your actual Render backend URL once it's deployed
        run: curl -s https://your-backend-url-on-render.onrender.com/api/health || echo "Failed to ping"
