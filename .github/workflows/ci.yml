name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # --- Backend ---
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: bun install

      - name: Run Backend Tests
        working-directory: ./backend
        run: bunx vitest run
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          JWT_SECRET: "dummy_secret_key_for_testing"
          JWT_REFRESH_SECRET: "dummy_refresh_secret_key_for_testing"
          REDIS_URL: "redis://localhost:6379"
          R2_ENDPOINT: "https://dummy.r2.cloudflarestorage.com"
          R2_BUCKET: "dummy_bucket"
          R2_PUBLIC_URL: "https://dummy.public.url"

      # --- Frontend ---
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build Frontend
        working-directory: ./frontend
        run: bun run build
